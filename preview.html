<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <!-- Allow pinch-to-zoom on mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Bracket Preview — BILPOS Tournament</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f1f5f9;
      --surface:   #ffffff;
      --border:    #cbd5e1;
      --text:      #0f172a;
      --muted:     #64748b;
      --accent:    #d97706;
      --green:     #16a34a;
      --red:       #dc2626;
      --card-h:    100px;
      --card-w:    260px;
      --card-gap:  8px;
      --round-gap: 48px;
      --arm:       24px;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden; /* pan+zoom container handles scrolling */
    }

    /* ── Header ───────────────────────────────────────── */
    .preview-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .preview-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15px;
      color: var(--accent);
    }
    .preview-brand .sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
    }
    .preview-hint {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Pan + Zoom outer container ──────────────────── */
    #bracket-outer {
      position: fixed;
      top: 52px;
      left: 0; right: 0; bottom: 0;
      overflow: hidden;
      touch-action: none; /* we handle all touch manually */
      background: var(--bg);
      cursor: grab;
    }
    #bracket-outer:active { cursor: grabbing; }

    /* ── Bracket scroll area (no overflow — panning handles it) ── */
    .bracket-scroll {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: var(--round-gap);
      padding: 24px 32px 64px;
    }

    /* ── Round column ─────────────────────────────────── */
    .round-col {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      width: var(--card-w);
      overflow: visible;
    }
    .round-label {
      text-align: center;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      padding: 4px 8px;
      background: rgba(217,119,6,0.08);
      border-radius: 6px;
      white-space: nowrap;
    }

    /* ── Match area (R1+ absolute container) ──────────── */
    .match-area {
      position: relative;
      overflow: visible;
      width: var(--card-w);
      flex-shrink: 0;
    }

    /* ── Match wrapper ────────────────────────────────── */
    .match-wrap {
      position: relative;
      overflow: visible;
      width: var(--card-w);
    }

    /* Left arm (R1+) */
    .match-wrap.has-arm::before {
      content: '';
      position: absolute;
      top: 50%;
      left: calc(-1 * var(--arm));
      width: var(--arm);
      height: 2px;
      background: #94a3b8;
      transform: translateY(-50%);
    }
    /* Right connector going down (even match) */
    .match-wrap.conn-top::after {
      content: '';
      position: absolute;
      top: 50%;
      right: calc(-1 * var(--arm));
      width: var(--arm);
      height: var(--conn-h, 54px);
      border-top: 2px solid #94a3b8;
      border-right: 2px solid #94a3b8;
    }
    /* Right connector going up (odd match) */
    .match-wrap.conn-bot::after {
      content: '';
      position: absolute;
      bottom: 50%;
      right: calc(-1 * var(--arm));
      width: var(--arm);
      height: calc(var(--conn-h, 54px) + 2px);
      border-bottom: 2px solid #94a3b8;
      border-right: 2px solid #94a3b8;
    }

    /* ── Match card ───────────────────────────────────── */
    .mc {
      width: var(--card-w);
      height: var(--card-h);
      background: var(--surface);
      border-radius: 10px;
      border: 1.5px solid var(--border);
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .mc.is-live {
      border-color: #dc2626;
      box-shadow: 0 0 12px 3px rgba(220,38,38,0.2);
    }
    .mc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }
    .mc-num {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .5px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .live-badge {
      font-size: 8px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 4px;
      background: #dc2626;
      color: #fff;
      letter-spacing: .5px;
    }
    .mc-slot {
      display: flex;
      align-items: center;
      gap: 5px;
      flex: 1;
      min-height: 28px;
      padding-left: 5px;
      border-left: 3px solid transparent;
      border-radius: 3px;
    }
    .mc-slot.win-slot  { border-left-color: var(--green); background: rgba(22,163,74,0.07); }
    .mc-slot.lose-slot { opacity: .55; border-left-color: rgba(220,38,38,0.3); }
    .mc-name {
      flex: 1;
      font-size: 10px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .mc-name.tbd { color: var(--muted); font-style: italic; }
    .mc-name.bye { color: var(--muted); font-style: italic; }
    .mc-score {
      flex-shrink: 0;
      width: 28px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .mc-badge {
      flex-shrink: 0;
      font-size: 8px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 4px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .mc-badge.win  { background: rgba(22,163,74,0.12);  color: var(--green); border: 1px solid rgba(22,163,74,0.3); }
    .mc-badge.lose { background: rgba(220,38,38,0.08);  color: var(--red);   border: 1px solid rgba(220,38,38,0.2); }

    /* ── Error / empty state ──────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
      color: var(--muted);
      text-align: center;
      padding: 32px;
    }
    .empty-state .icon { font-size: 48px; }
    .empty-state p { font-size: 14px; max-width: 400px; }

    /* ── QR card (fixed top-right) ────────────────────── */
    .qr-card {
      position: fixed;
      top: 68px;
      right: 20px;
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      border: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      z-index: 200;
    }
    .qr-title {
      font-size: 9px;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    /* QR canvas: square, no rounding, with visible border */
    .qr-card canvas {
      border-radius: 0;
      border: 2px solid #0f172a;
      display: block;
    }
    .qr-copy {
      font-size: 9px;
      color: #475569;
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      text-align: center;
    }
    .qr-copy:hover { background: #e2e8f0; }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 600px) {
      :root { --card-w: 220px; }
      .bracket-scroll { padding: 16px 16px 64px; gap: 36px; }
      .qr-card { top: 60px; right: 8px; }
      #bracket-outer { top: 50px; }
    }
  </style>
</head>
<body>

<header class="preview-header">
  <div class="preview-brand">
    <span>🏆</span>
    <div>
      <div id="preview-title">BILPOS Tournament</div>
      <div class="sub">Bracket Preview</div>
    </div>
  </div>
  <div class="preview-hint">
    <span>👁 Read-only</span>
    <span>·</span>
    <span>📱 Pinch to zoom · Drag to pan</span>
    <span>·</span>
    <button id="btn-fit" style="background:rgba(217,119,6,0.1);border:1px solid rgba(217,119,6,0.3);color:#d97706;font-family:inherit;font-size:10px;font-weight:600;padding:3px 9px;border-radius:5px;cursor:pointer;letter-spacing:.5px;">⊡ FIT</button>
  </div>
</header>

<div id="bracket-outer">
  <div id="bracket-root"></div>
</div>

<div class="qr-card" id="qr-card">
  <div class="qr-title">📲 Scan to Share</div>
  <div id="qr-wrap" style="display:flex;align-items:center;justify-content:center;min-width:100px;min-height:100px;">
    <span id="qr-status" style="font-size:10px;color:#64748b;text-align:center;">Generating…</span>
  </div>
  <button class="qr-copy" id="qr-copy-btn">📋 Copy link</button>
</div>

<script>
// ── Constants (must match bracketUtils.js) ─────────────────────────────
var CARD_HEIGHT = 100;
var CARD_GAP    = 8;
var ARM_LENGTH  = 24;

// ── Positioning helpers ────────────────────────────────────────────────
function computeMatchMargins(matchIdx) {
  var step   = (CARD_HEIGHT + CARD_GAP); // R0: step=108
  var offset = step / 2 - CARD_HEIGHT / 2; // =4
  return matchIdx === 0 ? offset : (step - CARD_HEIGHT); // =4 or 8
}

function computeMatchTop(roundIdx, matchIdx) {
  var step = (CARD_HEIGHT + CARD_GAP) * Math.pow(2, roundIdx);
  return matchIdx * step + (step - CARD_HEIGHT) / 2;
}

function computeMatchAreaHeight(roundIdx, numMatches) {
  if (numMatches === 0) return 0;
  var step    = (CARD_HEIGHT + CARD_GAP) * Math.pow(2, roundIdx);
  var lastTop = (numMatches - 1) * step + (step - CARD_HEIGHT) / 2;
  return lastTop + CARD_HEIGHT;
}

function computeConnectorHeight(roundIdx) {
  var step = (CARD_HEIGHT + CARD_GAP) * Math.pow(2, roundIdx);
  return step / 2;
}

function getRoundLabel(roundIdx, totalRounds) {
  var fromEnd = totalRounds - 1 - roundIdx;
  if (fromEnd === 0) return 'FINAL';
  if (fromEnd === 1) return 'SEMI FINAL';
  var n = Math.pow(2, fromEnd + 1);
  return n + ' BESAR';
}

function getMatchNumOffset(roundIdx, totalRounds) {
  var totalSlots = Math.pow(2, totalRounds);
  var offset = 0;
  for (var r = 0; r < roundIdx; r++) {
    offset += totalSlots / Math.pow(2, r + 1);
  }
  return offset;
}

// ── Participant display helpers ────────────────────────────────────────
function pLabel(p) {
  if (!p) return null;
  if (p.name === 'BYE') return 'BYE';
  var hc = (p.hcCustom || p.hc || '').toString().trim();
  return hc ? p.name + ' - ' + hc : p.name;
}

function pIsBye(p) { return p && p.name === 'BYE'; }
function pIsReal(p) { return p && p.id != null && p.name !== 'BYE'; }

// ── Render bracket ─────────────────────────────────────────────────────
function renderBracket(bracket, liveMatchId) {
  var root = document.getElementById('bracket-root');
  if (!bracket || !bracket.rounds || !bracket.rounds.length) {
    root.innerHTML = '<div class="empty-state"><div class="icon">🏆</div><p>Bracket belum tersedia. Buka halaman utama dan buat bracket terlebih dahulu.</p></div>';
    return;
  }

  var rounds     = bracket.rounds;
  var totalRounds = rounds.length;

  var scroll = document.createElement('div');
  scroll.className = 'bracket-scroll';

  rounds.forEach(function(round, roundIdx) {
    var isFirst  = roundIdx === 0;
    var isFinal  = roundIdx === totalRounds - 1;
    var connH    = computeConnectorHeight(roundIdx);
    var offset   = getMatchNumOffset(roundIdx, totalRounds);
    var label    = getRoundLabel(roundIdx, totalRounds);

    var col = document.createElement('div');
    col.className = 'round-col';

    var labelEl = document.createElement('div');
    labelEl.className = 'round-label';
    labelEl.textContent = label;
    col.appendChild(labelEl);

    if (isFirst) {
      // R0: flex layout with marginTop
      round.forEach(function(match, matchIdx) {
        var mt = computeMatchMargins(matchIdx);
        var wrap = buildMatchWrap(match, roundIdx, matchIdx, offset, isFirst, isFinal, connH, liveMatchId);
        wrap.style.marginTop = mt + 'px';
        col.appendChild(wrap);
      });
    } else {
      // R1+: absolute within match-area
      var areaH = computeMatchAreaHeight(roundIdx, round.length);
      var area = document.createElement('div');
      area.className = 'match-area';
      area.style.height = areaH + 'px';

      round.forEach(function(match, matchIdx) {
        var topY = computeMatchTop(roundIdx, matchIdx);
        var wrap = buildMatchWrap(match, roundIdx, matchIdx, offset, isFirst, isFinal, connH, liveMatchId);
        wrap.style.position = 'absolute';
        wrap.style.top = topY + 'px';
        area.appendChild(wrap);
      });
      col.appendChild(area);
    }

    scroll.appendChild(col);
  });

  root.appendChild(scroll);
}

function buildMatchWrap(match, roundIdx, matchIdx, offset, isFirst, isFinal, connH, liveMatchId) {
  var isTop = matchIdx % 2 === 0;

  var wrap = document.createElement('div');
  wrap.className = 'match-wrap';
  if (!isFirst) wrap.classList.add('has-arm');
  if (!isFinal && isTop)  wrap.classList.add('conn-top');
  if (!isFinal && !isTop) wrap.classList.add('conn-bot');
  wrap.style.setProperty('--conn-h', connH + 'px');

  wrap.appendChild(buildMatchCard(match, offset + matchIdx + 1, liveMatchId));
  return wrap;
}

function buildMatchCard(match, matchNum, liveMatchIds) {
  var winner    = match.winner;
  var isLive    = Array.isArray(liveMatchIds) && liveMatchIds.indexOf(match.id) !== -1;
  var p1        = match.p1;
  var p2        = match.p2;
  var p1Bye     = pIsBye(p1);
  var p2Bye     = pIsBye(p2);
  var isByeMatch = p1Bye || p2Bye;
  var bothScored = match.score1 !== '' && match.score1 != null
                && match.score2 !== '' && match.score2 != null;
  var winnerIsReal = winner && winner.id != null;
  var p1Win = winnerIsReal && p1 && p1.id != null && String(winner.id) === String(p1.id);
  var p2Win = winnerIsReal && p2 && p2.id != null && String(winner.id) === String(p2.id);

  var card = document.createElement('div');
  card.className = 'mc' + (isLive ? ' is-live' : '');

  // Header
  var hdr = document.createElement('div');
  hdr.className = 'mc-header';
  var num = document.createElement('span');
  num.className = 'mc-num';
  num.textContent = 'Match #' + matchNum;
  hdr.appendChild(num);
  if (isLive) {
    var lb = document.createElement('span');
    lb.className = 'live-badge';
    lb.textContent = '🔴 LIVE';
    hdr.appendChild(lb);
  }
  card.appendChild(hdr);

  // Slot builder
  function buildSlot(p, score, isWin, isLose, isBye) {
    var slot = document.createElement('div');
    var slotClass = 'mc-slot';
    if (isWin) slotClass += ' win-slot';
    else if (isLose) slotClass += ' lose-slot';
    slot.className = slotClass;

    var name = document.createElement('span');
    if (!p) {
      name.className = 'mc-name tbd';
      name.textContent = 'TBD';
    } else if (isBye) {
      name.className = 'mc-name bye';
      name.textContent = 'BYE';
    } else {
      name.className = 'mc-name';
      name.textContent = pLabel(p) || 'TBD';
    }
    slot.appendChild(name);

    if (!isBye && !isByeMatch && score !== '' && score != null) {
      var sc = document.createElement('span');
      sc.className = 'mc-score';
      sc.textContent = score;
      slot.appendChild(sc);
    }

    if (bothScored && winner && !isByeMatch) {
      var badge = document.createElement('span');
      badge.className = 'mc-badge ' + (isWin ? 'win' : 'lose');
      badge.textContent = isWin ? 'WIN' : 'LOSE';
      slot.appendChild(badge);
    }

    return slot;
  }

  card.appendChild(buildSlot(p1, match.score1, p1Win, p2Win && !p1Win, p1Bye));
  card.appendChild(buildSlot(p2, match.score2, p2Win, p1Win && !p2Win, p2Bye));

  return card;
}

// ── QR code (qrcode-generator: crisp canvas, scannable) ───────────────
function initQR() {
  var url     = window.location.href;
  var wrap    = document.getElementById('qr-wrap');
  var copyBtn = document.getElementById('qr-copy-btn');

  if (typeof qrcode !== 'undefined') {
    try {
      var qr = qrcode(0, 'L'); // type 0 = auto-detect version; L = max data capacity
      qr.addData(url);
      qr.make();

      var moduleCount = qr.getModuleCount();
      var cellSize    = Math.max(4, Math.ceil(220 / moduleCount)); // min 4px per module
      var canvasSize  = moduleCount * cellSize;

      var cvs = document.createElement('canvas');
      cvs.width  = canvasSize;
      cvs.height = canvasSize;
      cvs.style.display       = 'block';
      cvs.style.border        = '3px solid #0f172a';
      cvs.style.borderRadius  = '0';

      var ctx = cvs.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvasSize, canvasSize);
      ctx.fillStyle = '#0f172a';
      for (var row = 0; row < moduleCount; row++) {
        for (var col = 0; col < moduleCount; col++) {
          if (qr.isDark(row, col)) {
            ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
          }
        }
      }

      wrap.innerHTML = '';
      wrap.style.minWidth  = '';
      wrap.style.minHeight = '';
      wrap.appendChild(cvs);
    } catch(e) {
      wrap.innerHTML = '<span style="font-size:9px;color:#dc2626;text-align:center;padding:8px;">URL terlalu panjang.<br>Gunakan Copy link.</span>';
    }
  } else {
    wrap.innerHTML = '<span style="font-size:9px;color:#dc2626;text-align:center;padding:8px;">QR library<br>gagal dimuat.</span>';
  }

  copyBtn.addEventListener('click', function() {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(function() {
        copyBtn.textContent = '✅ Copied!';
        setTimeout(function() { copyBtn.textContent = '📋 Copy link'; }, 2000);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = url;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      copyBtn.textContent = '✅ Copied!';
      setTimeout(function() { copyBtn.textContent = '📋 Copy link'; }, 2000);
    }
  });
}

// ── Pan + Pinch Zoom ───────────────────────────────────────────────────
(function() {
  var outer = document.getElementById('bracket-outer');
  var inner = document.getElementById('bracket-root');
  if (!outer || !inner) return;

  var scale = 1, panX = 0, panY = 0;
  var MIN_SCALE = 0.05, MAX_SCALE = 4;

  inner.style.transformOrigin = '0 0';
  inner.style.display = 'inline-block';

  function applyTransform() {
    inner.style.transform = 'translate(' + panX + 'px, ' + panY + 'px) scale(' + scale + ')';
  }

  function autoFit() {
    var iW = inner.scrollWidth;
    var iH = inner.scrollHeight;
    var oW = outer.clientWidth;
    var oH = outer.clientHeight;
    if (!iW || !iH) return;
    var s = Math.min(oW / iW, oH / iH, 1);
    scale = s; panX = 0; panY = 0;
    applyTransform();
  }

  // ── Touch (1 finger = pan, 2 fingers = pinch zoom + pan) ──
  var startPanX, startPanY, startScale, startDist, startMid;

  outer.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (e.touches.length === 1) {
      startPanX = panX; startPanY = panY;
      startMid  = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else if (e.touches.length >= 2) {
      startDist  = Math.hypot(e.touches[1].clientX - e.touches[0].clientX,
                               e.touches[1].clientY - e.touches[0].clientY);
      startScale = scale;
      startPanX  = panX; startPanY = panY;
      startMid   = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
                     y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
    }
  }, { passive: false });

  outer.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (e.touches.length === 1 && startMid) {
      panX = startPanX + e.touches[0].clientX - startMid.x;
      panY = startPanY + e.touches[0].clientY - startMid.y;
    } else if (e.touches.length >= 2) {
      var dist  = Math.hypot(e.touches[1].clientX - e.touches[0].clientX,
                              e.touches[1].clientY - e.touches[0].clientY);
      var mx    = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      var my    = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      var newS  = Math.min(MAX_SCALE, Math.max(MIN_SCALE, startScale * dist / startDist));
      var ratio = newS / startScale;
      panX  = mx + ratio * (startPanX - startMid.x);
      panY  = my + ratio * (startPanY - startMid.y);
      scale = newS;
    }
    applyTransform();
  }, { passive: false });

  outer.addEventListener('touchend', function() { startMid = null; });

  // ── Mouse drag (desktop pan) ──
  var dragging = false, dragStartX, dragStartY, dragPanX, dragPanY;
  outer.addEventListener('mousedown', function(e) {
    dragging = true;
    dragStartX = e.clientX; dragStartY = e.clientY;
    dragPanX = panX; dragPanY = panY;
    e.preventDefault();
  });
  window.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    panX = dragPanX + e.clientX - dragStartX;
    panY = dragPanY + e.clientY - dragStartY;
    applyTransform();
  });
  window.addEventListener('mouseup', function() { dragging = false; });

  // ── Mouse wheel (desktop zoom) ──
  outer.addEventListener('wheel', function(e) {
    e.preventDefault();
    var factor  = e.deltaY > 0 ? 0.85 : 1 / 0.85;
    var newS    = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * factor));
    var rect    = outer.getBoundingClientRect();
    var ox = e.clientX - rect.left, oy = e.clientY - rect.top;
    panX  = ox + (panX - ox) * (newS / scale);
    panY  = oy + (panY - oy) * (newS / scale);
    scale = newS;
    applyTransform();
  }, { passive: false });

  // ── Fit button ──
  var fitBtn = document.getElementById('btn-fit');
  if (fitBtn) fitBtn.addEventListener('click', autoFit);

  // Auto-fit on load
  setTimeout(autoFit, 250);
})();

// ── Main: decode URL hash and render ──────────────────────────────────
(function() {
  var hash = window.location.hash.slice(1);
  if (!hash) {
    document.getElementById('bracket-root').innerHTML =
      '<div class="empty-state"><div class="icon">🔗</div><p>Tidak ada data bracket di URL ini. Buka halaman utama Bilpos Tournament dan klik tombol Preview.</p></div>';
    return;
  }

  var payload;
  try {
    var json = typeof LZString !== 'undefined'
      ? LZString.decompressFromEncodedURIComponent(hash)
      : decodeURIComponent(hash);
    payload = JSON.parse(json);
  } catch(e) {
    document.getElementById('bracket-root').innerHTML =
      '<div class="empty-state"><div class="icon">⚠️</div><p>Data bracket tidak dapat dibaca. Coba klik Preview lagi dari halaman utama.</p></div>';
    return;
  }

  // Set title
  var title = (payload.tournament && (payload.tournament.venue || payload.tournament.name)) || 'BILPOS Tournament';
  document.getElementById('preview-title').textContent = title;
  document.title = title + ' — Bracket Preview';

  // Render bracket
  var liveMatchIds = Array.isArray(payload.liveMatchIds)
    ? payload.liveMatchIds
    : (payload.liveMatchId ? [payload.liveMatchId] : []);
  renderBracket(payload.bracket, liveMatchIds);

  // Generate QR code after rendering
  initQR();
})();
</script>
