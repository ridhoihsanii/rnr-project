<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="RNR - Professional Billiard Tournament Management System by RNR INTAN"/>
  <meta name="theme-color" content="#0A0A0A"/>
  <title>RNR — Rack N Roll Tournament System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/js/bracket.bundle.css">
</head>
<body>
  <div class="bilpos-app">
    <header class="bilpos-header">
      <a class="header-brand" href="#">
        <span class="brand-icon">🏆</span>
        <div>
          <div>RACK N ROLL</div>
          <span class="brand-sub">RNR TOURNAMENT</span>
        </div>
      </a>
      <div class="header-center">
        <nav class="top-taskbar">
          <div class="sidebar-nav-item" data-section="dashboard">Dashboard</div>
          <div class="sidebar-nav-item" data-section="setup">Tournament Setup</div>
          <div class="sidebar-nav-item" data-section="participants">List Peserta RNR</div>
          <div class="sidebar-nav-item" data-section="bracket">
            <i class="fas fa-sitemap"></i> Bracket
          </div>
        </nav>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"><i class="fa-solid fa-moon" id="themeIcon"></i></button>
      </div>
    </header>

    <main class="bilpos-main" id="bilpos-main">
      <div id="toast-container"></div>

      <section class="bilpos-section active" id="section-dashboard">
        <div class="section-header">
          <div class="section-title">
            <i class="fas fa-th-large"></i>
            Dashboard
          </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
              <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-money-bill-wave"></i></div>
                <div class="stat-content">
                  <div class="stat-label">BAYAR CASH</div>
                  <div class="stat-value"><span id="stat-bayar-cash">0</span></div>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-exchange-alt"></i></div>
                <div class="stat-content">
                  <div class="stat-label">TRANSFER</div>
                  <div class="stat-value"><span id="stat-transfer">0</span></div>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="stat-card">
                <div class="stat-icon yellow"><i class="fas fa-wallet"></i></div>
                <div class="stat-content">
                  <div class="stat-label">TOTAL BAYAR</div>
                  <div class="stat-value"><span id="stat-total-bayar">0</span></div>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="stat-card">
                <div class="stat-icon red"><i class="fas fa-clock"></i></div>
                <div class="stat-content">
                  <div class="stat-label">BELUM BAYAR</div>
                  <div class="stat-value"><span id="stat-belum-bayar">0</span></div>
                </div>
              </div>
            </div>
          </div>


      </section>

      <section class="bilpos-section" id="section-setup">
        <div class="section-header">
          <div class="section-title">
            <i class="fas fa-cog"></i>
            Tournament Setup
          </div>
        </div>

        <div class="row g-3">
          <div class="col-lg-6">
            <div class="bilpos-card">
              <div class="card-header-bilpos">
                <div class="card-icon"><i class="fas fa-trophy"></i></div>
                <h5>Setup Tournament</h5>
              </div>
              <div class="bilpos-form-group">
                <label class="bilpos-label" for="input-size">Ukuran Tournament</label>
                <select class="bilpos-select" id="input-size">
                  <!-- <option value="16">16 Players</option> -->
                  <option value="32" selected>32 Players</option>
                  <!-- <option value="48">48 Players</option> -->
                  <option value="64">64 Players</option>
                  <!-- <option value="96">96 Players</option> -->
                  <option value="128">128 Players</option>
                </select>
              </div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="bilpos-card">
              <div class="card-header-bilpos">
                <div class="card-icon"><i class="fas fa-wallet"></i></div>
                <h5>Biaya Pendaftaran</h5>
              </div>
              <div class="bilpos-form-group" style="margin:16px">
                <label class="bilpos-label" for="input-fee">Biaya Pendaftaran (Rupiah)</label>
                <input type="number" min="0" step="1000" class="bilpos-input" id="input-fee" placeholder="0" />
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="bilpos-section" id="section-participants">
        <div class="section-header">
          <div class="section-title">
            <i class="fas fa-users"></i>
            List Peserta RNR
          </div>
        </div>

        <div class="table-controls mb-3">
          <div class="search-input-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" class="search-input" id="participant-search" placeholder="Cari nama..."/>
          </div>
          <div style="flex:1"></div>
          <button class="btn-export btn-export-pdf" id="btn-delete-all">
            <i class="fas fa-trash-alt me-1"></i> Hapus Semua Peserta
          </button>
        </div>

        <div class="bilpos-card p-0">
          <div class="participant-scroll-wrapper">
            <table class="participant-table" id="participant-table">
              <thead>
                <tr>
                  <th style="width:36px">#</th>
                  <th style="width:130px">PEMBAYARAN</th>
                  
                  <th>NAMA PESERTA</th>
                  <th style="width:130px">HC</th>
                  <th style="width:80px">-</th>
                </tr>
              </thead>
              <tbody id="participant-tbody">
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="bilpos-section" id="section-bracket">
        <div class="section-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
          <div class="section-title">
            <i class="fas fa-sitemap"></i>
            Tournament Bracket
          </div>
          <button id="btn-preview-bracket" title="Buka preview fullscreen yang bisa dibagikan" style="display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;border:1.5px solid rgba(250,204,21,0.4);background:rgba(250,204,21,0.07);color:#FACC15;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.5px;transition:background .15s,border-color .15s;">
            <i class="fas fa-eye"></i> PREVIEW
          </button>
        </div>
        <div id="bracket-react-root"></div>
      </section>




      <footer class="bilpos-footer mt-4">
        Built with <span class="heart">❤️</span> by <span>Ihsan</span>
      </footer>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/tournament.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/app.js"></script>
  <!-- Firebase Realtime Database -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="assets/js/firebase-sync.js"></script>
  <script src="assets/js/bracket.bundle.js"></script>
</body>
</html>
